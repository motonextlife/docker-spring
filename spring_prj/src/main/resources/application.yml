spring:
  datasource:
    url: jdbc:mysql://mysql:3306/spring_schema
    username: spring_user
    password: spring_pass
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 1073741824 #1GB
      max-request-size: 5368709120 #5GB

logging:
  file:
    name: "errorLogFile.log"
    max-size: 1000000